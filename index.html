<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Full-Stack Engineer | Portfolio</title>
    <style>
        /* --- DESIGN SYSTEM & VARS (Apple Pro Dark UI) --- */
        :root {
            --bg-color: #000000;
            --panel-bg: #161617;
            --panel-hover: #1c1c1e;
            --text-main: #f5f5f7;
            --text-secondary: #86868b;
            --accent-blue: #2997ff;
            --accent-green: #30d158;
            --border-color: rgba(255, 255, 255, 0.1);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- SMOOTH SCROLL EFFECT --- */
        html {
            scroll-behavior: smooth;
            background-color: var(--bg-color);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-stack);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -.022em;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* --- PREMIUM TRANSLUCENT NAVIGATION --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background: rgba(22, 22, 23, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 9999;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            max-width: 1024px;
            margin: 0 auto;
            padding: 0 22px;
        }

        .logo {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 32px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12px;
            font-weight: 400;
            transition: color 0.25s ease;
        }

        nav a:hover {
            color: var(--text-main);
        }

        /* --- HERO SECTION (Senior Recruiter Look) --- */
        .hero {
            padding: 160px 0 100px 0;
            text-align: center;
            background: radial-gradient(circle at 50% 30%, #1c1c1e 0%, #000000 70%);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(48, 209, 88, 0.1);
            border: 1px solid rgba(48, 209, 88, 0.2);
            color: var(--accent-green);
            padding: 6px 16px;
            border-radius: 980px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .hero h1 {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1.05;
            margin-bottom: 16px;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 24px;
            font-weight: 500;
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto 40px auto;
            line-height: 1.3;
        }

        .cta-group {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 400;
            border-radius: 980px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #43a4ff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* --- SECTION GENERIC STYLES --- */
        section {
            padding: 100px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .section-header {
            max-width: 600px;
            margin-bottom: 60px;
        }

        .section-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            display: block;
        }

        .section-title {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        /* --- SKILLS SECTION WITH ANIMATED PROGRESS BARS --- */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        .skill-group h3 {
            font-size: 20px;
            margin-bottom: 24px;
            color: var(--text-main);
            font-weight: 600;
        }

        .skill-item {
            margin-bottom: 20px;
        }

        .skill-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .skill-info span:last-child {
            color: var(--text-secondary);
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), #5ac8fa);
            border-radius: 3px;
            width: 0;
            animation: fillProgress 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fillProgress {
            to { width: var(--progress); }
        }

        /* --- PROJECT CARDS WITH PREMIUM IMAGES --- */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 32px;
        }

        .project-card {
            background: var(--panel-bg);
            border-radius: 22px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease;
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: var(--panel-hover);
        }

        .project-image {
            width: 100%;
            height: 240px;
            position: relative;
            overflow: hidden;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .project-img-1 { background: linear-gradient(135deg, #0d47a1 0%, #00e5ff 100%); }
        .project-img-2 { background: linear-gradient(135deg, #311b92 0%, #ea80fc 100%); }
        .project-img-3 { background: linear-gradient(135deg, #1b5e20 0%, #b9f6ca 100%); }
        .project-img-4 { background: linear-gradient(135deg, #e65100 0%, #ffd180 100%); }

        .mock-ui {
            width: 85%;
            height: 75%;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 8px;
            transform: translateY(20px);
            transition: transform 0.4s ease;
        }

        .project-card:hover .mock-ui {
            transform: translateY(10px);
        }

        .mock-nav { display: flex; gap: 6px; }
        .mock-dot { width: 6px; height: 6px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        .mock-line { height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; }
        .mock-box { flex: 1; background: rgba(255,255,255,0.05); border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }

        .project-content {
            padding: 32px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .project-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 11px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 4px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .project-card h3 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .project-card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .project-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 400;
            margin-top: auto;
        }

        /* --- EXPERIENCES / RECRUITER LOOK --- */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 32px;
            max-width: 800px;
        }

        .timeline-item {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .time-meta h4 { font-size: 18px; font-weight: 600; }
        .time-meta p { color: var(--accent-blue); font-size: 14px; margin-top: 4px; }
        .time-period {
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 980px;
        }

        /* --- CONTACT SECTION --- */
        .contact-panel {
            background: linear-gradient(180deg, var(--panel-bg) 0%, #000000 100%);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 60px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .contact-panel h2 { font-size: 42px; font-weight: 700; margin-bottom: 16px; }
        .contact-panel p { color: var(--text-secondary); font-size: 18px; margin-bottom: 32px; }

        /* --- FOOTER --- */
        footer {
            padding: 40px 0;
            background: #000;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 12px;
        }

        .footer-container { display: flex; justify-content: space-between; align-items: center; }

        /* --- RESPONSIVE MOBILE VERSION --- */
        @media (max-width: 900px) {
            .skills-container { grid-template-columns: 1fr; gap: 30px; }
            .project-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .hero
