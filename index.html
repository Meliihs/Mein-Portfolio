<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Developer Portfolio</title>

<style>
:root {
  --bg: #0a0a0a;
  --card: #161616;
  --text: #f5f5f7;
  --muted: #a1a1a6;
  --accent: #0071e3;
}

body.light {
  --bg: #ffffff;
  --card: #f2f2f2;
  --text: #1d1d1f;
  --muted: #6e6e73;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* LOADING SCREEN */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  z-index: 999;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 18px 40px;
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
}

nav a {
  color: var(--text);
  margin-left: 15px;
  text-decoration: none;
  opacity: 0.7;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
}

.hero h1 { font-size: 60px; }
.hero p { color: var(--muted); }

/* BUTTON */
.btn {
  background: var(--accent);
  color: white;
  padding: 12px 20px;
  border-radius: 30px;
  display: inline-block;
  margin-top: 20px;
  cursor: pointer;
}

/* PROJECTS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 16px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* SKILLS */
.skill {
  margin: 10px 0;
}

.bar {
  height: 10px;
  background: #333;
  border-radius: 20px;
}

.fill {
  height: 100%;
  background: var(--accent);
  width: 0;
  animation: load 2s forwards;
}

@keyframes load {
  to { width: var(--w); }
}

/* TOGGLE */
.toggle {
  cursor: pointer;
  font-size: 14px;
}

/* MOBILE */
@media(max-width:600px){
  .hero h1{font-size:40px;}
}
</style>
</head>

<body>

<div id="loader">Loading Portfolio...</div>

<nav>
  <div><strong>Dev Portfolio</strong></div>
  <div>
    <a href="#projects">Projects</a>
    <a href="#skills">Skills</a>
    <span class="toggle" onclick="toggleTheme()">🌗</span>
  </div>
</nav>

<div class="hero">
  <h1>Hi, ich bin Developer</h1>
  <p>Software • AI • Backend • Game Dev</p>
  <div class="btn" onclick="loadGitHub()">Load My GitHub</div>
</div>

<section id="projects">
<h2>GitHub Projekte</h2>
<div class="grid" id="repoGrid"></div>
</section>

<section id="skills">
<h2>Skills</h2>

Python
<div class="bar"><div class="fill" style="--w:90%"></div></div>

Java
<div class="bar"><div class="fill" style="--w:80%"></div></div>

JavaScript
<div class="bar"><div class="fill" style="--w:75%"></div></div>

Unity
<div class="bar"><div class="fill" style="--w:70%"></div></div>

</section>

<script>
// LOADING
window.onload = () => {
  setTimeout(()=> document.getElementById("loader").style.display="none", 800);
};

// DARK/LIGHT
function toggleTheme(){
  document.body.classList.toggle("light");
}

// GITHUB API
async function loadGitHub(){
  const username = Meliihs;

  const res = await fetch(`https://api.github.com/users/${username}/repos`);
  const data = await res.json();

  const grid = document.getElementById("repoGrid");
  grid.innerHTML = "";

  data.slice(0,6).forEach(repo=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://media.giphy.com/media/l0HlNaQ6gWfllcjDO/giphy.gif">
      <h3>${repo.name}</h3>
      <p>${repo.description || "No description"}</p>
      <a href="${repo.html_url}" target="_blank">Open GitHub</a>
    `;

    grid.appendChild(div);
  });
}
</script>

</body>
</html>
